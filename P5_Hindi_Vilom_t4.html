<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vilom Master - Antonym Learning App</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }

        /* 3D Flashcard Styles */
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        .card-container {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .animate-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Progress Bar */
        .progress-bar-inner {
            transition: width 0.3s ease;
        }

        .no-select {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-2xl relative overflow-hidden">

        </header>

        <!-- Main Content Area -->
        <main id="app-content" class="flex-1 relative overflow-y-auto">
            <!-- Content injected by JS -->

    </div>

        class VilomApp {
            constructor() {
                this.content = document.getElementById('app-content');
                this.homeBtn = document.getElementById('homeBtn');
                this.stats = JSON.parse(localStorage.getItem('vilom_stats')) || { mastered: [], struggling: [] };
                this.currentView = 'home';
                
                // Session State
                this.sessionPool = [];
                this.currentIndex = 0;
                this.score = 0;
                this.flipped = false;
                this.feedback = null;
                this.gameOptions = [];
                this.TOTAL_GAME_CARDS = 25;

                this.init();
            }

            saveStats() {
                localStorage.setItem('vilom_stats', JSON.stringify(this.stats));
            }

            updateStats(word, isCorrect) {
                const mastered = new Set(this.stats.mastered);
                const struggling = new Set(this.stats.struggling);

                if (isCorrect) {
                    struggling.delete(word);
                    mastered.add(word);
                } else {
                    mastered.delete(word);
                    struggling.add(word);
                }

                this.stats.mastered = Array.from(mastered);
                this.stats.struggling = Array.from(struggling);
                this.saveStats();
            }

            shuffle(array) {
                const shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            }

            switchView(view) {
                this.currentView = view;
                this.homeBtn.classList.toggle('hidden', view === 'home');
                this.render();
            }

            init() {
                this.render();
            }

            render() {
                this.content.innerHTML = '';
                if (this.currentView === 'home') this.renderHome();
                else if (this.currentView === 'flashcards') this.renderFlashcards();
                else if (this.currentView === 'game') this.renderGame();
                
                lucide.createIcons();
            }

            // --- Views ---

            renderHome() {
                const html = `
                    <div class="p-6 space-y-8 animate-in">
                        <div class="space-y-2">
                            <h2 class="text-3xl font-extrabold text-slate-800">नमस्ते!</h2>
                            <p class="text-slate-500 text-sm">Master Hindi Antonyms with unique practice sessions.</p>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-green-50 p-4 rounded-2xl border border-green-100 flex flex-col items-center text-center">
                                <div class="text-green-600 bg-green-100 p-2 rounded-xl mb-2"><i data-lucide="check-circle-2"></i></div>
                                <span class="text-2xl font-bold text-green-700">${this.stats.mastered.length}</span>
                                <span class="text-xs font-medium text-green-600 uppercase tracking-wider">Mastered</span>
                            </div>
                            <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100 flex flex-col items-center text-center">
                                <div class="text-orange-600 bg-orange-100 p-2 rounded-xl mb-2"><i data-lucide="brain-circuit"></i></div>
                                <span class="text-2xl font-bold text-orange-700">${this.stats.struggling.length}</span>
                                <span class="text-xs font-medium text-orange-600 uppercase tracking-wider">Review</span>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <button onclick="app.startFlashcards()" class="w-full bg-slate-800 text-white p-5 rounded-2xl flex items-center justify-between hover:bg-slate-700 transition-all shadow-lg active:scale-95 group">
                                <div class="flex items-center gap-4">
                                    <div class="bg-slate-700 p-2.5 rounded-xl group-hover:scale-110 transition-transform"><i data-lucide="book-open"></i></div>
                                    <div class="text-left font-bold text-lg">Learn Words</div>
                                </div>
                                <i data-lucide="chevron-right" class="text-slate-500"></i>
                            </button>

                            <button onclick="app.startGame()" class="w-full bg-orange-500 text-white p-5 rounded-2xl flex items-center justify-between hover:bg-orange-400 transition-all shadow-lg active:scale-95 group">
                                <div class="flex items-center gap-4">
                                    <div class="bg-orange-400 p-2.5 rounded-xl group-hover:scale-110 transition-transform"><i data-lucide="trophy"></i></div>
                                    <div class="text-left font-bold text-lg">Challenge Mode (25)</div>
                                </div>
                                <i data-lucide="chevron-right" class="text-orange-100"></i>
                            </button>
                        </div>
                    </div>
                `;
                this.content.innerHTML = html;
            }

            startFlashcards() {
                this.sessionPool = this.shuffle(VILOM_DATA);
                this.currentIndex = 0;
                this.flipped = false;
                this.switchView('flashcards');
            }

            renderFlashcards() {
                const current = this.sessionPool[this.currentIndex];
                const html = `
                    <div class="p-6 h-full flex flex-col items-center animate-in">
                        <div class="w-full flex justify-between items-center mb-6">
                            <h3 class="font-bold text-slate-700">Card ${this.currentIndex + 1}/${this.sessionPool.length}</h3>
                            <span class="bg-slate-100 text-slate-500 text-[10px] px-2 py-0.5 rounded-full flex items-center gap-1 font-bold">
                                <i data-lucide="shuffle" class="w-3 h-3"></i> Unique Session
                            </span>
                        </div>

                        <div id="flashcard" onclick="app.flipCard()" class="w-full h-80 relative cursor-pointer perspective-1000 no-select">
                            <div class="card-container relative w-full h-full preserve-3d shadow-xl rounded-3xl ${this.flipped ? 'rotate-y-180' : ''}">
                                <!-- Front -->
                                <div class="absolute inset-0 backface-hidden bg-white border-2 border-slate-100 rounded-3xl flex flex-col items-center justify-center p-8">
                                    <span class="text-slate-400 text-xs font-bold uppercase mb-4 tracking-tighter">The Word</span>
                                    <div class="text-4xl font-black text-slate-800 text-center leading-tight">${current.word}</div>
                                    <div class="text-slate-400 text-sm mt-8">Tap to flip</div>
                                </div>
                                <!-- Back -->
                                <div class="absolute inset-0 backface-hidden bg-orange-50 border-2 border-orange-200 rounded-3xl flex flex-col items-center justify-center p-8 rotate-y-180">
                                    <span class="text-orange-400 text-xs font-bold uppercase mb-4 tracking-tighter">Antonym</span>
                                    <div class="text-4xl font-black text-orange-600 text-center leading-tight">${current.antonym}</div>
                                    <p class="text-slate-500 font-medium mt-2 italic text-sm">${current.english}</p>
                                    <hr class="w-full my-4 border-orange-200" />
                                    <p class="text-center text-slate-700 text-sm italic leading-relaxed">"${current.usage}"</p>
                                </div>
                            </div>
                        </div>

                        <div class="flex gap-4 mt-8 w-full">
                            <button onclick="app.prevCard()" class="flex-1 bg-white border border-slate-200 p-4 rounded-2xl flex items-center justify-center gap-2 active:scale-95 shadow-sm">
                                <i data-lucide="chevron-left"></i> Prev
                            </button>
                            <button onclick="app.nextCard()" class="flex-1 bg-slate-800 text-white p-4 rounded-2xl flex items-center justify-center gap-2 active:scale-95 shadow-sm">
                                Next <i data-lucide="chevron-right"></i>
                            </button>
                        </div>
                    </div>
                `;
                this.content.innerHTML = html;
            }

            flipCard() {
                this.flipped = !this.flipped;
                const container = document.querySelector('.card-container');
                if (container) {
                    container.classList.toggle('rotate-y-180', this.flipped);
                }
            }

            nextCard() {
                this.flipped = false;
                this.currentIndex = (this.currentIndex + 1) % this.sessionPool.length;
                this.render();
            }

            prevCard() {
                this.flipped = false;
                this.currentIndex = (this.currentIndex - 1 + this.sessionPool.length) % this.sessionPool.length;
                this.render();
            }

            // --- Game Logic ---

            startGame() {
                const struggling = VILOM_DATA.filter(d => this.stats.struggling.includes(d.word));
                const rest = VILOM_DATA.filter(d => !this.stats.struggling.includes(d.word));
                
                // Shuffle both and take 25 unique
                const combined = [...this.shuffle(struggling), ...this.shuffle(rest)];
