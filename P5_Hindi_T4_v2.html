        function OneWordQuiz({ data }) {
            const [gameState, setGameState] = useState('start');
            const [questions, setQuestions] = useState([]);
            const [qIndex, setQIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [selected, setSelected] = useState(null);

            const startQuiz = () => {
                const selectedQs = shuffleArray(data).slice(0, 10).map(q => {
                    const distractors = shuffleArray(data.filter(i => i.id !== q.id)).slice(0, 3).map(i => i.word);
                    return { ...q, options: shuffleArray([q.word, ...distractors]) };
                });
                setQuestions(selectedQs); setQIndex(0); setScore(0); setSelected(null); setGameState('playing');
            };

            if (gameState === 'start') return (
                <div className="bg-white rounded-3xl p-10 text-center shadow-sm border border-slate-200">
                    <div className="text-6xl mb-4">🎯</div>
                    <h2 className="text-2xl font-bold mb-4">10 Question Challenge</h2>
                    <button onClick={startQuiz} className="bg-green-500 text-white text-xl font-bold py-3 px-8 rounded-xl shadow-md">Start Quiz 🚀</button>
                </div>
            );

            if (gameState === 'results') return (
                <div className="bg-white rounded-3xl p-10 text-center shadow-sm border border-slate-200">
                    <h2 className="text-3xl font-bold mb-6">Quiz Complete!</h2>
                    <p className="text-6xl font-black text-blue-600 mb-8">{score} <span className="text-3xl text-slate-400">/ 10</span></p>
                    <button onClick={startQuiz} className="bg-blue-500 text-white font-bold py-3 px-8 rounded-xl">Play Again 🔄</button>
                </div>
            );

            const q = questions[qIndex];
            const isAnswered = selected !== null;

            return (
                <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-200">
                    <div className="flex justify-between text-slate-400 text-sm font-bold mb-4">
                        <span>Question {qIndex + 1}/10</span><span>Score: {score}</span>
                    </div>
                    <h3 className="text-2xl font-bold text-center mb-8">"{q.phrase}"</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {q.options.map((opt, i) => {
                            let css = "bg-slate-50 text-slate-700 border-slate-200";
                            if (isAnswered) {
                                if (opt === q.word) css = "bg-green-100 border-green-500 text-green-800";
                                else if (opt === selected) css = "bg-red-100 border-red-500 text-red-800";
                                else css = "opacity-50";
                            }
                            return (
                                <button key={i} disabled={isAnswered} onClick={() => { setSelected(opt); if (opt === q.word) setScore(s => s + 1); }}
                                    className={`py-4 px-6 rounded-2xl border-2 font-bold text-lg transition-all ${css} ${!isAnswered && 'hover:bg-slate-100'}`}>
                                    {opt}
                                </button>
                            );
                        })}
                    </div>
                    {isAnswered && (
                        <div className="mt-8 flex justify-end animate-fade-in">
                            <button onClick={() => qIndex < 9 ? setQIndex(qIndex + 1) || setSelected(null) : setGameState('results')}
                                className="bg-slate-800 text-white font-bold py-3 px-8 rounded-xl">
                                {qIndex === 9 ? 'Results 📊' : 'Next ➡️'}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

                                    <div className="flex items-end gap-3 mb-2">
                                        <h3 className="text-3xl font-black">{card.w2}</h3>
                                        <p className="text-xl font-medium opacity-90">= {card.m2}</p>
                                    </div>
                                    <p className="text-sm md:text-base italic opacity-80 bg-black/20 p-2 rounded-lg inline-block self-start">"{card.s2}"</p>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div className="flex gap-6 mt-10">
                        <button onClick={() => handleNav(-1)} className="bg-white text-slate-700 px-6 py-3 rounded-xl shadow-sm border border-slate-200 font-bold flex gap-2"><span>⬅️</span> Prev</button>
                        <button onClick={() => handleNav(1)} className="bg-purple-600 hover:bg-purple-700 text-white px-8 py-3 rounded-xl shadow-md font-bold flex gap-2">Next <span>➡️</span></button>
                    </div>
                </div>
            );
        }

        function HomonymsQuiz({ data }) {
            const [gameState, setGameState] = useState('start');
            const [questions, setQuestions] = useState([]);
            const [qIndex, setQIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [selected, setSelected] = useState(null);

            const startQuiz = () => {
                // Get exactly 10 random questions from the 16 homonym questions
                const selectedQs = shuffleArray(data).slice(0, 10);
                setQuestions(selectedQs); setQIndex(0); setScore(0); setSelected(null); setGameState('playing');
            };

            if (gameState === 'start') return (
                <div className="bg-white rounded-3xl p-10 text-center shadow-sm border border-slate-200 max-w-2xl mx-auto">
                    <div className="text-6xl mb-4">✍️</div>
                    <h2 className="text-2xl font-bold mb-4">Fill in the Blanks!</h2>
                    <p className="text-slate-500 mb-8">Choose the correct homonym to complete the sentence.</p>
                    <button onClick={startQuiz} className="bg-rose-500 hover:bg-rose-600 text-white text-xl font-bold py-3 px-8 rounded-xl shadow-md transition-transform hover:scale-105">Start Quiz 🚀</button>
                </div>
            );

            if (gameState === 'results') {
                const perc = (score / 10) * 100;
                let emoji = perc === 100 ? "🏆" : perc >= 70 ? "🌟" : "📚";
                return (
                    <div className="bg-white rounded-3xl p-10 text-center shadow-sm border border-slate-200 max-w-2xl mx-auto">
                        <div className="text-7xl mb-4">{emoji}</div>
                        <h2 className="text-3xl font-bold mb-2">Quiz Complete!</h2>
                        <div className="bg-slate-50 rounded-2xl p-6 mb-8 mt-4 inline-block">
                            <p className="text-slate-500 font-bold mb-1 uppercase tracking-widest">Score</p>
                            <p className="text-6xl font-black text-rose-500">{score} <span className="text-3xl text-slate-300">/ 10</span></p>
                        </div>
                        <div>
                            <button onClick={startQuiz} className="bg-slate-800 text-white font-bold py-3 px-8 rounded-xl">Play Again 🔄</button>
                        </div>
                    </div>
                );
            }

            const q = questions[qIndex];
            const isAnswered = selected !== null;

            // Render sentence with blank replaced if answered
            const sentenceParts = q.sentence.split('________');
            
            return (
                <div className="bg-white rounded-3xl p-8 md:p-12 shadow-sm border border-slate-200 max-w-3xl mx-auto">
                    <div className="flex justify-between text-slate-400 text-sm font-bold mb-8 uppercase tracking-widest">
                        <span>Q {qIndex + 1} of 10</span>
                        <span>Score: {score}</span>
                    </div>
                    
                    <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-10 text-center">
                        <h3 className="text-2xl md:text-3xl font-medium text-slate-700 leading-relaxed">
                            {sentenceParts[0]}
                            <span className={`inline-block px-4 py-1 mx-2 rounded-lg font-bold min-w-[100px] border-b-4 border-slate-300 ${isAnswered ? (selected === q.answer ? 'bg-green-100 text-green-700 border-green-400' : 'bg-red-100 text-red-700 border-red-400') : 'text-slate-300'}`}>
                                {isAnswered ? selected : " ? "}
                            </span>
                            {sentenceParts[1]}
                        </h3>
                    </div>

                    <div className="flex flex-col sm:flex-row justify-center gap-6">
                        {q.options.map((opt, i) => {
                            let btnClass = "bg-white text-slate-700 border-slate-300 hover:border-rose-400 hover:text-rose-600 shadow-sm";
                            if (isAnswered) {
                                if (opt === q.answer) btnClass = "bg-green-500 border-green-600 text-white shadow-md";
                                else if (opt === selected) btnClass = "bg-red-500 border-red-600 text-white";
                                else btnClass = "bg-slate-100 border-slate-200 text-slate-400 opacity-50";
                            }
                            return (
                                <button key={i} disabled={isAnswered} onClick={() => { setSelected(opt); if (opt === q.answer) setScore(s => s + 1); }}
                                    className={`flex-1 py-5 px-8 rounded-2xl border-2 font-black text-2xl transition-all ${btnClass} ${!isAnswered && 'transform hover:-translate-y-1'}`}>
                                    {opt}
                                </button>
                            );
                        })}
                    </div>

                    {isAnswered && (
                        <div className="mt-10 flex justify-center animate-fade-in">
                            <button onClick={() => qIndex < 9 ? setQIndex(qIndex + 1) || setSelected(null) : setGameState('results')}
                                className="bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-12 rounded-xl shadow-lg transition-transform active:scale-95 text-lg">
                                {qIndex === 9 ? 'Show Results 📊' : 'Next Question ➡️'}
                            </button>
                        </div>
                    )}
                </div>
            );
        }


        // ==========================================
        // MAIN APPLICATION ROUTER / MENU
        // ==========================================
        function App() {
            // Views: 'menu', 'oneWord', 'homonyms'
            const [currentView, setCurrentView] = useState('menu');

            if (currentView === 'oneWord') {
                return <OneWordApp onBack={() => setCurrentView('menu')} />;
            }

            if (currentView === 'homonyms') {
                return <HomonymsApp onBack={() => setCurrentView('menu')} />;
            }

            // Main Menu View
            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
                    <div className="text-center mb-12 animate-fade-in">
                        <span className="text-6xl mb-4 block">📚</span>
                        <h1 className="text-4xl md:text-6xl font-black text-slate-800 mb-4 tracking-tight">
                            Primary 5 Hindi
                        </h1>
                        <p className="text-xl text-slate-500 font-medium max-w-md mx-auto">
                            Interactive vocabulary learning hub for exam preparation. Choose a topic to begin!
                        </p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl w-full px-4 animate-fade-in" style={{animationDelay: '0.1s'}}>
                        
                        {/* Card 1: One Word Substitution */}
                        <div onClick={() => setCurrentView('oneWord')} 
                             className="group bg-white rounded-3xl p-8 shadow-sm hover:shadow-xl transition-all cursor-pointer border-2 border-transparent hover:border-blue-400 transform hover:-translate-y-2">
                            <div className="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center text-3xl mb-6 group-hover:scale-110 transition-transform">
                                🎯
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800 mb-2">अनेक शब्दों के लिए एक शब्द</h2>
                            <h3 className="text-lg text-blue-600 font-semibold mb-4">One Word Substitution</h3>
                            <p className="text-slate-500 leading-relaxed mb-6">
                                Learn how to express long phrases using just a single powerful word. Includes 50 essential words with categories and quizzes.
                            </p>
                            <div className="flex items-center text-blue-500 font-bold gap-2 group-hover:translate-x-2 transition-transform">
                                Start Learning <span>→</span>
                            </div>
                        </div>

                        {/* Card 2: Homonyms */}
                        <div onClick={() => setCurrentView('homonyms')} 
                             className="group bg-white rounded-3xl p-8 shadow-sm hover:shadow-xl transition-all cursor-pointer border-2 border-transparent hover:border-purple-400 transform hover:-translate-y-2">
                            <div className="w-16 h-16 bg-purple-100 rounded-2xl flex items-center justify-center text-3xl mb-6 group-hover:scale-110 transition-transform">
                                ⚖️
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800 mb-2">श्रुतिसम भिन्नार्थक शब्द</h2>
                            <h3 className="text-lg text-purple-600 font-semibold mb-4">Homonyms</h3>
                            <p className="text-slate-500 leading-relaxed mb-6">
                                Master tricky word pairs that sound almost identical but have completely different meanings. Includes textbook MCQs.
                            </p>
                            <div className="flex items-center text-purple-500 font-bold gap-2 group-hover:translate-x-2 transition-transform">
                                Start Learning <span>→</span>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
