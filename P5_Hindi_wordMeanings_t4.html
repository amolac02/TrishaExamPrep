        // ==========================================
        // 1. STUDY TAB COMPONENT

        // ==========================================

        // ==========================================
        function FlashcardsTab({ data }) {
            const [shuffledData, setShuffledData] = useState(() => shuffleArray(data));
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const handleNext = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    setCurrentIndex((prev) => (prev + 1) % shuffledData.length);
                }, 150);
            };

            const handlePrev = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    setCurrentIndex((prev) => (prev - 1 + shuffledData.length) % shuffledData.length);
                }, 150);
            };

            const handleShuffle = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    setShuffledData(shuffleArray(data));
                    setCurrentIndex(0);
                }, 150);
            };

            const currentCard = shuffledData[currentIndex];

            return (
                <div className="flex flex-col items-center justify-center animate-fade-in py-8">
                    <div className="w-full max-w-lg flex justify-between items-center mb-6">
                        <button 
                            onClick={handleShuffle}
                            className="text-sm font-bold bg-white text-blue-600 px-4 py-2 rounded-xl shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors flex items-center gap-2"
                        >
                            <span>🔀</span> Shuffle Cards
                        </button>
                        <div className="text-slate-500 font-semibold bg-white px-4 py-2 rounded-full shadow-sm">
                            Card {currentIndex + 1} of {shuffledData.length}
                        </div>
                    </div>

                        className="relative w-full max-w-lg aspect-[4/3] perspective-1000 cursor-pointer group"
                        onClick={() => setIsFlipped(!isFlipped)}
                    >

                                    </p>
                                </div>
                            </div>

        // ==========================================
        // 3. QUIZ GAME TAB COMPONENT
        // ==========================================
        function QuizTab({ data }) {
            const [gameState, setGameState] = useState('start');
            const [questions, setQuestions] = useState([]);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [isAnswerChecked, setIsAnswerChecked] = useState(false);

            const generateQuiz = () => {
                const shuffledData = shuffleArray(data);
                const selectedQuestions = shuffledData.slice(0, 10).map((q) => {
                    const otherWords = data.filter(item => item.id !== q.id);
                    const distractors = shuffleArray(otherWords).slice(0, 3).map(item => item.word);
                    const options = shuffleArray([q.word, ...distractors]);
                    return { ...q, options };
                });
                
                setQuestions(selectedQuestions);
                setCurrentQuestionIndex(0);
                setScore(0);
                setSelectedOption(null);
                setIsAnswerChecked(false);
                setGameState('playing');
            };

            const handleOptionSelect = (option) => {
                if (isAnswerChecked) return;
                setSelectedOption(option);
                setIsAnswerChecked(true);

                if (option === questions[currentQuestionIndex].word) {
                    setScore(prev => prev + 1);
                }
            };

            const handleNextQuestion = () => {
                if (currentQuestionIndex < questions.length - 1) {
                    setCurrentQuestionIndex(prev => prev + 1);
                    setSelectedOption(null);
                    setIsAnswerChecked(false);
                } else {
                    setGameState('results');
                }
            };

            if (gameState === 'start') {
                return (
                    <div className="bg-white rounded-3xl p-10 text-center shadow-sm border border-slate-200 animate-fade-in max-w-2xl mx-auto mt-10">
                        <div className="text-8xl mb-6">🎯</div>
                        <h2 className="text-3xl font-bold text-slate-800 mb-4">Hindi Word Master Quiz</h2>
                        <p className="text-slate-600 mb-8 text-lg">
                            Test your knowledge! You will get 10 random phrases. Choose the correct "One Word" for each. Let's see if you can score 10/10!
                        </p>
                        <button 
                            onClick={generateQuiz}
                            className="bg-green-500 hover:bg-green-600 text-white text-xl font-bold py-4 px-10 rounded-2xl shadow-lg transition-transform transform hover:scale-105"
                        >
                            Start Quiz Now! 🚀
                        </button>
                    </div>
                );
            }

            if (gameState === 'results') {
                const percentage = (score / questions.length) * 100;
                let feedback = "";
                let emoji = "";
                
                if (percentage === 100) { feedback = "Perfect Score! You are a Hindi Master!"; emoji = "🏆"; }
                else if (percentage >= 80) { feedback = "Great Job! Almost perfect!"; emoji = "🌟"; }
                else if (percentage >= 50) { feedback = "Good Effort! Keep practicing."; emoji = "👍"; }
                else { feedback = "Needs more practice. Try studying the flashcards!"; emoji = "📚"; }

                return (
                    <div className="bg-white rounded-3xl p-10 text-center shadow-sm border border-slate-200 animate-fade-in max-w-2xl mx-auto mt-10">
                        <div className="text-8xl mb-4">{emoji}</div>
                        <h2 className="text-3xl font-bold text-slate-800 mb-2">Quiz Completed!</h2>
                        <p className="text-xl text-slate-600 mb-6">{feedback}</p>
                        
                        <div className="bg-slate-50 rounded-2xl p-6 mb-8 inline-block">
                            <p className="text-slate-500 text-lg uppercase tracking-wider font-bold mb-1">Your Score</p>
                            <p className="text-6xl font-black text-blue-600">{score} <span className="text-3xl text-slate-400">/ 10</span></p>
                        </div>

                        <div>
                            <button 
                                onClick={generateQuiz}
                                className="bg-blue-500 hover:bg-blue-600 text-white text-lg font-bold py-3 px-8 rounded-xl shadow-md transition-colors mr-4"
                            >
                                Play Again 🔄
                            </button>
                        </div>
                    </div>
                );
            }

            const currentQ = questions[currentQuestionIndex];

            return (
                <div className="max-w-3xl mx-auto animate-fade-in">
                    <div className="mb-8">
                        <div className="flex justify-between text-slate-500 font-bold text-sm mb-2 px-1">
                            <span>Question {currentQuestionIndex + 1} of 10</span>
                            <span>Score: {score}</span>
                        </div>
                        <div className="w-full bg-slate-200 rounded-full h-3 overflow-hidden">
                            <div 
                                className="bg-green-500 h-3 rounded-full transition-all duration-500 ease-out"
                                style={{ width: `${((currentQuestionIndex + 1) / 10) * 100}%` }}
                            ></div>
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-200 mb-6">
                        <h3 className="text-2xl md:text-3xl font-bold text-slate-800 text-center mb-8 leading-tight">
                            "{currentQ.phrase}"
                        </h3>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {currentQ.options.map((option, index) => {
                                let btnClass = "bg-slate-50 hover:bg-slate-100 text-slate-700 border-2 border-slate-200";
                                
                                if (isAnswerChecked) {
                                    if (option === currentQ.word) {
                                        btnClass = "bg-green-100 border-green-500 text-green-800";
                                    } else if (option === selectedOption) {
                                        btnClass = "bg-red-100 border-red-500 text-red-800";
                                    } else {
                                        btnClass = "bg-slate-50 border-slate-200 text-slate-400 opacity-50";
                                    }
                                }

                                return (
                                    <button
                                        key={index}
                                        onClick={() => handleOptionSelect(option)}
                                        disabled={isAnswerChecked}
                                        className={`text-xl font-bold py-4 px-6 rounded-2xl transition-all duration-300 ${btnClass} ${!isAnswerChecked && 'hover:-translate-y-1 hover:shadow-md cursor-pointer'}`}
                                    >
                                        {option}
                                    </button>
                                );
                            })}
                        </div>

                        {isAnswerChecked && (
                            <div className="mt-8 pt-6 border-t border-slate-100 flex flex-col md:flex-row items-center justify-between gap-4 animate-fade-in">
                                <div className="text-left bg-blue-50 p-4 rounded-xl flex-1 border border-blue-100">
                                    <p className="text-sm font-bold text-blue-800 mb-1">Example usage:</p>
                                    <p className="text-blue-900 italic">"{currentQ.sentence}"</p>
                                </div>
                                <button
                                    onClick={handleNextQuestion}
                                    className="bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-8 rounded-xl shadow-md whitespace-nowrap transition-transform active:scale-95"
                                >
                                    {currentQuestionIndex === 9 ? 'See Results 📊' : 'Next Question ➡️'}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // MAIN APP COMPONENT
        // ==========================================
        function App() {
            const [activeTab, setActiveTab] = useState('study');

            return (
                <div>
                    <header className="bg-gradient-to-r from-orange-400 via-red-500 to-pink-500 text-white shadow-md">
                        <div className="max-w-4xl mx-auto px-4 py-6 text-center">
                            <h1 className="text-3xl md:text-4xl font-bold mb-2 drop-shadow-md">
                                अनेक शब्दों के लिए एक शब्द
                            </h1>
                            <p className="text-lg md:text-xl font-medium opacity-90">
                                Primary 5 Hindi Exam Prep 🚀
                            </p>
                        </div>
                    </header>

                    <nav className="max-w-4xl mx-auto px-4 mt-6">
                        <div className="flex bg-white rounded-2xl shadow-sm overflow-hidden p-1 border border-slate-200">
                            <button
                                onClick={() => setActiveTab('study')}
                                className={`flex-1 flex items-center justify-center gap-2 py-3 px-2 text-sm md:text-base font-semibold rounded-xl transition-all ${
                                    activeTab === 'study' ? 'bg-orange-100 text-orange-700 shadow-sm' : 'text-slate-500 hover:bg-slate-50'
                                }`}
                            >
                                <span className="text-xl">📖</span> Study List
                            </button>
                            <button
                                onClick={() => setActiveTab('flashcards')}
                                className={`flex-1 flex items-center justify-center gap-2 py-3 px-2 text-sm md:text-base font-semibold rounded-xl transition-all ${
                                    activeTab === 'flashcards' ? 'bg-blue-100 text-blue-700 shadow-sm' : 'text-slate-500 hover:bg-slate-50'
                                }`}
                            >
                                <span className="text-xl">🗂️</span> Flashcards
                            </button>
                            <button
                                onClick={() => setActiveTab('quiz')}
                                className={`flex-1 flex items-center justify-center gap-2 py-3 px-2 text-sm md:text-base font-semibold rounded-xl transition-all ${
                                    activeTab === 'quiz' ? 'bg-green-100 text-green-700 shadow-sm' : 'text-slate-500 hover:bg-slate-50'
                                }`}
                            >
                                <span className="text-xl">🎮</span> Quiz Game
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto px-4 mt-8">
                        {activeTab === 'study' && <StudyTab data={hindiWordsData} />}
                        {activeTab === 'flashcards' && <FlashcardsTab data={hindiWordsData} />}
                        {activeTab === 'quiz' && <QuizTab data={hindiWordsData} />}
                    </main>
                </div>
            );
        }

        // Render the React app to the DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
